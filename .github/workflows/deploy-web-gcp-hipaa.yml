name: Deploy Web (GCP HIPAA)

on:
  push:
    branches:
      - codex/prod-hipaa
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            logging.googleapis.com

      - name: Ensure Artifact Registry repo
        env:
          REGION: ${{ secrets.GCP_REGION }}
          REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
        run: |
          gcloud artifacts repositories describe "$REPO" --location="$REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$REPO" \
            --repository-format=docker \
            --location="$REGION" \
            --description="OpenScribe production web images"

      - name: Build container image
        id: image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/openscribe-web:${GITHUB_SHA::12}"
          gcloud builds submit --tag "$IMAGE_URI" -f docker/web-cloudrun.Dockerfile .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy Cloud Run
        env:
          REGION: ${{ secrets.GCP_REGION }}
          SERVICE_NAME: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
          RUNTIME_SA: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE_URI" \
            --region "$REGION" \
            --platform managed \
            --port 8080 \
            --service-account "$RUNTIME_SA" \
            --ingress all \
            --execution-environment gen2 \
            --cpu 1 \
            --memory 2Gi \
            --min-instances 1 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest" \
            --allow-unauthenticated

      - name: Print service URL
        env:
          REGION: ${{ secrets.GCP_REGION }}
          SERVICE_NAME: ${{ secrets.GCP_CLOUD_RUN_SERVICE }}
        run: gcloud run services describe "$SERVICE_NAME" --region "$REGION" --format='value(status.url)'
